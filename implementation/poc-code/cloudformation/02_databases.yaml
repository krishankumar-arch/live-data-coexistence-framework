AWSTemplateFormatVersion: '2010-09-09'
Description: |
  LDCF POC Stack 2/5 - Databases
  Author: Krishan Kumar | ORCID: 0009-0009-7302-7566
  RDS MySQL (legacy source) + Aurora PostgreSQL Serverless v2 (cloud target)

Parameters:
  EnvironmentName:
    Type: String
    Default: ldcf-poc
  DBUsername:
    Type: String
    Default: ldcfadmin
  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: Password for both databases (min 8 chars)

Resources:
  # ── Secrets Manager ──────────────────────────────────────────
  MySQLSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${EnvironmentName}-mysql-secret"
      Description: RDS MySQL credentials for LDCF POC
      SecretString: !Sub |
        {"username":"${DBUsername}","password":"${DBPassword}"}

  AuroraSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${EnvironmentName}-aurora-secret"
      Description: Aurora PostgreSQL credentials for LDCF POC
      SecretString: !Sub |
        {"username":"${DBUsername}","password":"${DBPassword}"}

  # ── RDS MySQL — Legacy Source ─────────────────────────────────
  # Free tier: db.t3.micro, 20GB storage
  # Parameter group enables binary logging for DMS CDC
  MySQLParamGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: LDCF POC MySQL params - enables CDC for DMS
      Family: mysql8.0
      Parameters:
        binlog_format:          ROW
        binlog_row_image:       FULL
        binlog_checksum:        NONE
        # PATTERN 1: MySQL generates EVEN keys only (legacy side)
        # Aurora uses ODD sequences → dual-sequence key partitioning
        # offset=2 + increment=2 → sequence: 1000000, 1000002, 1000004 (even)
        # offset=1 (default) + increment=2 → sequence: 1000001, 1000003 (odd - wrong!)
        auto_increment_increment: "2"
        auto_increment_offset:   "2"

  MySQLInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    Properties:
      DBInstanceIdentifier: !Sub "${EnvironmentName}-mysql-legacy"
      DBInstanceClass: db.t3.micro        # free tier eligible
      Engine: mysql
      EngineVersion: "8.0"
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      DBName: insurance
      AllocatedStorage: "20"
      StorageType: gp2
      PubliclyAccessible: true   # Enables DBeaver + db_setup Lambda access
      MultiAZ: false
      DBSubnetGroupName: !ImportValue
        Fn::Sub: "${EnvironmentName}-db-subnet-group"
      VPCSecurityGroups:
        - !ImportValue
          Fn::Sub: "${EnvironmentName}-db-sg"
      DBParameterGroupName: !Ref MySQLParamGroup
      BackupRetentionPeriod: 1
      Tags:
        - {Key: Name,    Value: !Sub "${EnvironmentName}-mysql-legacy"}
        - {Key: Pattern, Value: "LDCF-Pattern-1-even-sequences"}

  # ── RDS PostgreSQL — Cloud Target ────────────────────────────
  # db.t3.micro free-tier eligible; replaces Aurora Serverless v2
  # (WithExpressConfiguration is an API-only flag, not valid in CloudFormation)
  # Output names kept identical so downstream stacks need no changes.
  PostgreSQLInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    Properties:
      DBInstanceIdentifier: !Sub "${EnvironmentName}-aurora-target"
      DBInstanceClass: db.t3.micro        # free tier eligible
      Engine: postgres
      EngineVersion: "15"
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      DBName: ldcfdb
      AllocatedStorage: "20"
      StorageType: gp2
      PubliclyAccessible: true   # Enables DBeaver + db_setup Lambda access
      MultiAZ: false
      DBSubnetGroupName: !ImportValue
        Fn::Sub: "${EnvironmentName}-db-subnet-group"
      VPCSecurityGroups:
        - !ImportValue
          Fn::Sub: "${EnvironmentName}-db-sg"
      BackupRetentionPeriod: 1
      Tags:
        - {Key: Name,    Value: !Sub "${EnvironmentName}-aurora-target"}
        - {Key: Pattern, Value: "LDCF-Pattern-1-odd-sequences"}

Outputs:
  MySQLEndpoint:
    Value: !GetAtt MySQLInstance.Endpoint.Address
    Export: {Name: !Sub "${EnvironmentName}-mysql-endpoint"}

  AuroraEndpoint:
    Value: !GetAtt PostgreSQLInstance.Endpoint.Address
    Export: {Name: !Sub "${EnvironmentName}-aurora-endpoint"}

  MySQLSecretArn:
    Value: !Ref MySQLSecret
    Export: {Name: !Sub "${EnvironmentName}-mysql-secret-arn"}

  AuroraSecretArn:
    Value: !Ref AuroraSecret
    Export: {Name: !Sub "${EnvironmentName}-aurora-secret-arn"}
