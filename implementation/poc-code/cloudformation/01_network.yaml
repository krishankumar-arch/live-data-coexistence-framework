AWSTemplateFormatVersion: '2010-09-09'
Description: |
  LDCF POC Stack 1/5 - Network Infrastructure
  Author: Krishan Kumar | ORCID: 0009-0009-7302-7566
  VPC, subnets, security groups for LDCF POC.

Parameters:
  EnvironmentName:
    Type: String
    Default: ldcf-poc

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags: [{Key: Name, Value: !Sub "${EnvironmentName}-vpc"}]

  SubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags: [{Key: Name, Value: !Sub "${EnvironmentName}-subnet-a"}]

  SubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags: [{Key: Name, Value: !Sub "${EnvironmentName}-subnet-b"}]

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref SubnetA, RouteTableId: !Ref RouteTable}

  SubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: {SubnetId: !Ref SubnetB, RouteTableId: !Ref RouteTable}

  # Security group for RDS and Aurora
  DatabaseSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Database access for LDCF POC
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 10.0.0.0/16
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp: 10.0.0.0/16
      Tags: [{Key: Name, Value: !Sub "${EnvironmentName}-db-sg"}]

  # Security group for Lambda
  LambdaSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Lambda outbound for LDCF POC
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags: [{Key: Name, Value: !Sub "${EnvironmentName}-lambda-sg"}]

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: LDCF POC DB subnet group
      SubnetIds: [!Ref SubnetA, !Ref SubnetB]

Outputs:
  VpcId:          {Value: !Ref VPC,          Export: {Name: !Sub "${EnvironmentName}-vpc-id"}}
  SubnetAId:      {Value: !Ref SubnetA,      Export: {Name: !Sub "${EnvironmentName}-subnet-a"}}
  SubnetBId:      {Value: !Ref SubnetB,      Export: {Name: !Sub "${EnvironmentName}-subnet-b"}}
  DatabaseSGId:   {Value: !Ref DatabaseSG,   Export: {Name: !Sub "${EnvironmentName}-db-sg"}}
  LambdaSGId:     {Value: !Ref LambdaSG,     Export: {Name: !Sub "${EnvironmentName}-lambda-sg"}}
  DBSubnetGroup:  {Value: !Ref DBSubnetGroup, Export: {Name: !Sub "${EnvironmentName}-db-subnet-group"}}
